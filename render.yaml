# ============================================================================
# Yunta-Agro — Infraestructura como código para Render (Blueprint).
# Developed by Marketnauta
# ----------------------------------------------------------------------------
# Define la demo completa con UN clic desde el dashboard de Render:
#   1. yunta-db        → PostgreSQL gestionado (plan free)
#   2. yunta-backend   → API Express + ts-node (plan free; duerme tras 15min)
#   3. yunta-frontend  → SPA React/Vite servida como sitio estático
#
# El backend corre migraciones + seed automáticamente en cada deploy
# (preDeployCommand), así la cuenta demo +51999888777 / PIN 1234 queda lista.
# ============================================================================
databases:
  - name: yunta-db
    plan: free
    databaseName: yunta
    user: yunta

services:
  # --- Backend: API REST (Express + Prisma + ts-node) -----------------------
  - type: web
    name: yunta-backend
    runtime: node
    plan: free
    rootDir: backend
    # El plan free NO permite preDeployCommand, así que migraciones + seed
    # (idempotentes) corren dentro del build. 'prisma generate' va incluido en
    # 'release' vía build → ver scripts en backend/package.json.
    buildCommand: npm install && npm run build && npm run release
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: yunta-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true        # Render genera un secreto seguro y lo fija.
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        # URL pública del frontend (se rellena tras el primer deploy del sitio).
        sync: false
      - key: CRON_ENABLED
        value: "true"

  # --- Frontend: SPA estática (React 19 + Vite) -----------------------------
  - type: web
    name: yunta-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # Reescritura SPA: cualquier ruta sirve index.html (react-router en cliente).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        # URL pública del backend (se rellena tras el primer deploy de la API).
        sync: false
